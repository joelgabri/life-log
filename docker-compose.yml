services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifelog
      POSTGRES_PASSWORD: lifelog
      POSTGRES_DB: lifelog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifelog"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://lifelog:lifelog@db:5432/lifelog
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
